name: Build Gemini WebView Official

on:
  push:
    branches: [ Webview ] # আপনার ব্রাঞ্চের নাম অনুযায়ী সেট করা হয়েছে
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix_and_build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Auto-Inject WebView Code & Fix
        run: |
          # ১. pubspec.yaml আপডেট (সব প্যাকেজ সহ)
          cat <<EOF > pubspec.yaml
          name: gemini_ai_pro
          description: A professional Gemini WebView application
          version: 1.0.0+1
          environment:
            sdk: '>=3.2.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            webview_flutter: ^4.7.0
            flutter_statusbarcolor_ns: ^0.5.1
          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^3.0.0
          flutter:
            uses-material-design: true
          EOF

          # ২. main.dart ফাইলে ওয়েবভিউ কোড ইনজেক্ট করা
          mkdir -p lib
          cat <<EOF > lib/main.dart
          import 'package:flutter/material.dart';
          import 'package:webview_flutter/webview_flutter.dart';
          import 'package:flutter_statusbarcolor_ns/flutter_statusbarcolor_ns.dart';

          void main() {
            WidgetsFlutterBinding.ensureInitialized();
            runApp(const GeminiWebApp());
          }

          class GeminiWebApp extends StatelessWidget {
            const GeminiWebApp({super.key});
            @override
            Widget build(BuildContext context) {
              FlutterStatusbarcolor.setStatusBarColor(const Color(0xFF131314));
              return MaterialApp(
                debugShowCheckedModeBanner: false,
                theme: ThemeData(brightness: Brightness.dark),
                home: const GeminiWebView(),
              );
            }
          }

          class GeminiWebView extends StatefulWidget {
            const GeminiWebView({super.key});
            @override
            State<GeminiWebView> createState() => _GeminiWebViewState();
          }

          class _GeminiWebViewState extends State<GeminiWebView> {
            late final WebViewController controller;
            bool _isLoading = true;

            @override
            void initState() {
              super.initState();
              controller = WebViewController()
                ..setJavaScriptMode(JavaScriptMode.unrestricted)
                ..setBackgroundColor(const Color(0xFF131314))
                ..setNavigationDelegate(
                  NavigationDelegate(
                    onPageStarted: (String url) => setState(() => _isLoading = true),
                    onPageFinished: (String url) => setState(() => _isLoading = false),
                  ),
                )
                ..loadRequest(Uri.parse('https://gemini.google.com/'));
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                backgroundColor: const Color(0xFF131314),
                body: SafeArea(
                  child: Stack(
                    children: [
                      WebViewWidget(controller: controller),
                      if (_isLoading)
                        const Center(child: CircularProgressIndicator(color: Colors.blue)),
                    ],
                  ),
                ),
              );
            }
          }
          EOF

          # ৩. অ্যান্ড্রয়েড পারমিশন ও গ্রেডল ফিক্স
          sed -i 's/minSdkVersion .*/minSdkVersion 21/' android/app/build.gradle
          sed -i 's/targetSdkVersion .*/targetSdkVersion 33/' android/app/build.gradle
          sed -i 's/applicationId .*/applicationId "com.vibestudio.gemini"/' android/app/build.gradle
          
          # ইন্টারনেট পারমিশন নিশ্চিত করা
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET"/>' android/app/src/main/AndroidManifest.xml
          
          # গ্রেডল ডাউনলোড সোর্স ফিক্স (৫.০.২ এরর এড়াতে)
          sed -i 's|distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-7.6.1-all.zip|' android/gradle/wrapper/gradle-wrapper.properties

      - name: Build Final WebView APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload Gemini WebView APK
        uses: actions/upload-artifact@v4
        with:
          name: Gemini-WebView-Final
          path: build/app/outputs/flutter-apk/app-release.apk
