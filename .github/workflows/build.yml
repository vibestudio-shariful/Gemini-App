name: Build Gemini Pro Android 8.1 Special

on:
  push:
    branches: [ Webview ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Native Project Structure
        run: |
          echo "include ':app'" > settings.gradle
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { 
                  classpath "com.android.tools.build:gradle:8.2.2"
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.22"
              }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          mkdir -p app/src/main/java/com/vibestudio/geminiai
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/anim

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application'; id 'org.jetbrains.kotlin.android' }
          android {
              namespace 'com.vibestudio.geminiai'
              compileSdk 34
              defaultConfig {
                  applicationId "com.vibestudio.geminiai"
                  minSdk 26  // Android 8.0+ এর জন্য অপ্টিমাইজড
                  targetSdk 34
                  versionCode 8
                  versionName "1.7-OreoFix"
              }
              buildTypes { release { minifyEnabled false; shrinkResources false } }
              compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
              kotlinOptions { jvmTarget = '17' }
          }
          dependencies {
              implementation "androidx.appcompat:appcompat:1.6.1"
              implementation "com.google.android.material:material:1.9.0"
          }
          EOF

          # Pulse Animation for Android 8.1
          cat <<EOF > app/src/main/res/anim/pulse.xml
          <set xmlns:android="http://schemas.android.com/apk/res/android">
              <scale android:duration="1200" android:fromXScale="1.0" android:fromYScale="1.0" android:toXScale="1.15" android:toYScale="1.15" android:pivotX="50%" android:pivotY="50%" android:repeatCount="infinite" android:repeatMode="reverse"/>
          </set>
          EOF

          # MainActivity.kt (Android 8.1 Stable Engine)
          cat <<EOF > app/src/main/java/com/vibestudio/geminiai/MainActivity.kt
          package com.vibestudio.geminiai
          import android.Manifest
          import android.content.*
          import android.graphics.Color
          import android.net.Uri
          import android.os.*
          import android.view.View
          import android.view.animation.AnimationUtils
          import android.webkit.*
          import android.widget.*
          import androidx.appcompat.app.AppCompatActivity
          import androidx.core.app.ActivityCompat

          class MainActivity : AppCompatActivity() {
              private lateinit var webView: WebView
              private lateinit var splash: View
              private var fileCallback: ValueCallback<Array<Uri>>? = null

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_main)
                  
                  window.statusBarColor = Color.parseColor("#131314")
                  webView = findViewById(R.id.webView)
                  splash = findViewById(R.id.custom_splash)
                  val logo = findViewById<ImageView>(R.id.splash_logo)
                  logo.startAnimation(AnimationUtils.loadAnimation(this, R.anim.pulse))

                  // Android 8.1 Permissions
                  ActivityCompat.requestPermissions(this, arrayOf(
                      Manifest.permission.RECORD_AUDIO, Manifest.permission.CAMERA,
                      Manifest.permission.WRITE_EXTERNAL_STORAGE, Manifest.permission.READ_EXTERNAL_STORAGE
                  ), 1)

                  setupWebView()
                  webView.loadUrl("https://gemini.google.com/")
              }

              private fun setupWebView() {
                  webView.settings.apply {
                      javaScriptEnabled = true
                      domStorageEnabled = true
                      allowFileAccess = true
                      setSupportZoom(false)
                      // Oreo-friendly User Agent
                      userAgentString = "Mozilla/5.0 (Linux; Android 8.1.0; SM-J710F) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Mobile Safari/537.36"
                  }

                  webView.webViewClient = object : WebViewClient() {
                      override fun onPageFinished(v: WebView?, u: String?) {
                          splash.animate().alpha(0f).setDuration(500).withEndAction { 
                              splash.visibility = View.GONE; webView.visibility = View.VISIBLE 
                          }
                      }
                      override fun onReceivedError(v: WebView?, r: WebResourceRequest?, e: WebResourceError?) {
                          findViewById<LinearLayout>(R.id.offline_layout).visibility = View.VISIBLE
                          splash.visibility = View.GONE
                      }
                  }

                  // ANDROID 8.1 SAFE DOWNLOAD (Prevents Force Close)
                  webView.setDownloadListener { url, _, _, _, _ ->
                      try {
                          // সরাসরি সিস্টেম ব্রাউজারে পাঠিয়ে দেওয়া যাতে অ্যাপ ক্র্যাশ না করে
                          val intent = Intent(Intent.ACTION_VIEW, Uri.parse(url))
                          startActivity(intent)
                          Toast.makeText(this, "Downloading via Browser...", Toast.LENGTH_SHORT).show()
                      } catch (e: Exception) {
                          Toast.makeText(this, "Error: Could not start download", Toast.LENGTH_SHORT).show()
                      }
                  }

                  webView.webChromeClient = object : WebChromeClient() {
                      override fun onPermissionRequest(req: PermissionRequest) { req.grant(req.resources) }
                      override fun onShowFileChooser(w: WebView?, f: ValueCallback<Array<Uri>>?, c: FileChooserParams?): Boolean {
                          fileCallback = f
                          try { startActivityForResult(c?.createIntent()!!, 100) } catch (e: Exception) { return false }
                          return true
                      }
                  }
              }

              override fun onActivityResult(requestCode: Int, resultCode: Int, data: Intent?) {
                  super.onActivityResult(requestCode, resultCode, data)
                  if (requestCode == 100) {
                      fileCallback?.onReceiveValue(WebChromeClient.FileChooserParams.parseResult(resultCode, data))
                      fileCallback = null
                  }
              }

              override fun onBackPressed() {
                  if (webView.canGoBack()) webView.goBack() else {
                      android.app.AlertDialog.Builder(this)
                          .setMessage("Exit Gemini Pro?")
                          .setPositiveButton("Yes") { _, _ -> finish() }
                          .setNegativeButton("No", null).show()
                  }
              }
          }
          EOF

          # Layout & Style (Oreo Compatible)
          cat <<EOF > app/src/main/res/layout/activity_main.xml
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#131314">
              <WebView android:id="@+id/webView" android:layout_width="match_parent" android:layout_height="match_parent" android:visibility="gone"/>
              <LinearLayout android:id="@+id/offline_layout" android:layout_width="match_parent" android:layout_height="match_parent" android:gravity="center" android:orientation="vertical" android:visibility="gone">
                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="No Connection" android:textColor="#FFFFFF" android:textSize="18sp"/>
                  <Button android:id="@+id/retry_btn" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Retry" android:layout_marginTop="20dp" android:backgroundTint="#4285F4"/>
              </LinearLayout>
              <LinearLayout android:id="@+id/custom_splash" android:layout_width="match_parent" android:layout_height="match_parent" android:gravity="center" android:orientation="vertical" android:background="#131314">
                  <ImageView android:id="@+id/splash_logo" android:layout_width="90dp" android:layout_height="90dp" android:src="@drawable/ic_gemini_logo"/>
                  <ProgressBar android:layout_width="40dp" android:layout_height="40dp" android:layout_marginTop="40dp" android:indeterminateTint="#4285F4"/>
                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Oreo Optimized" android:textColor="#4285F4" android:textSize="10sp" android:layout_marginTop="10dp" android:alpha="0.5"/>
              </LinearLayout>
          </RelativeLayout>
          EOF

          cat <<EOF > app/src/main/res/drawable/ic_gemini_logo.xml
          <vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="100dp" android:height="100dp" android:viewportWidth="24" android:viewportHeight="24">
              <path android:fillColor="#4285F4" android:pathData="M12,2L14.5,9.5L22,12L14.5,14.5L12,22L9.5,14.5L2,12L9.5,9.5L12,2Z"/>
          </vector>
          EOF

          echo "<resources><style name='Theme.GeminiAi' parent='Theme.MaterialComponents.DayNight.NoActionBar'><item name='android:statusBarColor'>#131314</item></style></resources>" > app/src/main/res/values/themes.xml

          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/><uses-permission android:name="android.permission.RECORD_AUDIO"/><uses-permission android:name="android.permission.CAMERA"/><uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/><uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>
              <application android:label="Gemini Pro" android:icon="@drawable/ic_gemini_logo" android:theme="@style/Theme.GeminiAi" android:requestLegacyExternalStorage="true">
                  <activity android:name=".MainActivity" android:exported="true" android:screenOrientation="portrait" android:configChanges="orientation|screenSize">
                      <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Build with Gradle
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Gemini-Pro-v1.7-OreoFix
          path: app/build/outputs/apk/release/app-release-unsigned.apk
