name: Build Gemini Ai Premium Pro

on:
  push:
    branches: [ Webview ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Native Project Structure
        run: |
          echo "include ':app'" > settings.gradle
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { 
                  classpath "com.android.tools.build:gradle:8.2.2"
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.22"
              }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          mkdir -p app/src/main/java/com/vibestudio/geminiai
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          mkdir -p app/src/main/res/drawable

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application'; id 'org.jetbrains.kotlin.android' }
          android {
              namespace 'com.vibestudio.geminiai'
              compileSdk 34
              defaultConfig {
                  applicationId "com.vibestudio.geminiai"
                  minSdk 27
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              aaptOptions { cruncherEnabled = false; useNewCruncher = false }
              compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
              kotlinOptions { jvmTarget = '17' }
          }
          dependencies {
              implementation "androidx.appcompat:appcompat:1.6.1"
              implementation "com.google.android.material:material:1.9.0"
              implementation "androidx.cardview:cardview:1.0.0"
          }
          EOF

          # MainActivity.kt (Strong Voice & Custom UI Logic)
          cat <<EOF > app/src/main/java/com/vibestudio/geminiai/MainActivity.kt
          package com.vibestudio.geminiai
          import android.Manifest
          import android.content.Intent
          import android.net.Uri
          import android.os.Bundle
          import android.view.View
          import android.webkit.*
          import android.widget.*
          import androidx.appcompat.app.AppCompatActivity
          import androidx.core.app.ActivityCompat

          class MainActivity : AppCompatActivity() {
              private lateinit var webView: WebView
              private var fileCallback: ValueCallback<Array<Uri>>? = null

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_main)
                  
                  webView = findViewById(R.id.webView)
                  val splash = findViewById<View>(R.id.custom_splash)
                  val offline = findViewById<View>(R.id.offline_screen)

                  ActivityCompat.requestPermissions(this, arrayOf(
                      Manifest.permission.RECORD_AUDIO, 
                      Manifest.permission.CAMERA,
                      Manifest.permission.MODIFY_AUDIO_SETTINGS,
                      Manifest.permission.READ_EXTERNAL_STORAGE
                  ), 1)

                  webView.settings.apply {
                      javaScriptEnabled = true
                      domStorageEnabled = true
                      mediaPlaybackRequiresUserGesture = false
                      allowFileAccess = true
                      databaseEnabled = true
                  }

                  webView.webViewClient = object : WebViewClient() {
                      override fun onPageFinished(view: WebView?, url: String?) {
                          splash.animate().alpha(0f).setDuration(1000).withEndAction {
                              splash.visibility = View.GONE
                              webView.visibility = View.VISIBLE
                          }
                      }
                      override fun onReceivedError(v: WebView?, r: WebResourceRequest?, e: WebResourceError?) {
                          webView.visibility = View.GONE
                          offline.visibility = View.VISIBLE
                      }
                  }
                  
                  webView.webChromeClient = object : WebChromeClient() {
                      // এটিই ভয়েস বাটন সচল করার আসল কোড
                      override fun onPermissionRequest(request: PermissionRequest) {
                          runOnUiThread { request.grant(request.resources) }
                      }
                      override fun onShowFileChooser(w: WebView?, f: ValueCallback<Array<Uri>>?, c: FileChooserParams?): Boolean {
                          fileCallback = f
                          val intent = Intent(Intent.ACTION_GET_CONTENT).apply {
                              addCategory(Intent.CATEGORY_OPENABLE); type = "*/*"
                          }
                          startActivityForResult(Intent.createChooser(intent, "Upload"), 100)
                          return true
                      }
                  }

                  findViewById<Button>(R.id.retry_btn).setOnClickListener {
                      offline.visibility = View.GONE
                      splash.visibility = View.VISIBLE
                      webView.reload()
                  }
                  webView.loadUrl("https://gemini.google.com/")
              }

              override fun onActivityResult(requestCode: Int, resultCode: Int, data: Intent?) {
                  super.onActivityResult(requestCode, resultCode, data)
                  if (requestCode == 100) {
                      val results = if (data == null || resultCode != RESULT_OK) null else arrayOf(data.data!!)
                      fileCallback?.onReceiveValue(results as Array<Uri>?)
                      fileCallback = null
                  }
              }
              override fun onBackPressed() { if(webView.canGoBack()) webView.goBack() else super.onBackPressed() }
          }
          EOF

          # UI Design: Premium Splash & Modern Offline
          cat <<EOF > app/src/main/res/layout/activity_main.xml
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:app="http://schemas.android.com/apk/res-auto"
              android:layout_width="match_parent" android:layout_height="match_parent" android:background="#0A0A0A">
              
              <WebView android:id="@+id/webView" android:layout_width="match_parent" android:layout_height="match_parent" android:visibility="gone"/>
              
              <LinearLayout android:id="@+id/custom_splash" android:layout_width="match_parent" android:layout_height="match_parent"
                  android:gravity="center" android:orientation="vertical" android:background="@drawable/gradient_bg">
                  <androidx.cardview.widget.CardView
                      android:layout_width="120dp" android:layout_height="120dp"
                      app:cardCornerRadius="60dp" app:cardElevation="20dp" app:cardBackgroundColor="#1E1E1E">
                      <ImageView android:layout_width="match_parent" android:layout_height="match_parent" 
                          android:src="@mipmap/ic_launcher" android:padding="20dp" android:scaleType="centerInside"/>
                  </androidx.cardview.widget.CardView>
                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" 
                      android:text="Gemini Pro" android:textColor="#FFFFFF" android:textSize="28sp" 
                      android:textStyle="bold" android:layout_marginTop="25dp" android:letterSpacing="0.1"/>
                  <ProgressBar android:layout_width="40dp" android:layout_height="40dp" android:layout_marginTop="40dp" android:indeterminateTint="#8AB4F8"/>
              </LinearLayout>

              <LinearLayout android:id="@+id/offline_screen" android:layout_width="match_parent" android:layout_height="match_parent"
                  android:gravity="center" android:orientation="vertical" android:visibility="gone" android:background="#0A0A0A">
                  <ImageView android:layout_width="100dp" android:layout_height="100dp" android:src="@mipmap/ic_launcher" android:alpha="0.3"/>
                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" 
                      android:text="ইন্টারনেট সংযোগ নেই" android:textColor="#808080" android:textSize="18sp" android:layout_marginTop="30dp"/>
                  <Button android:id="@+id/retry_btn" android:layout_width="wrap_content" android:layout_height="wrap_content" 
                      android:text="আবার চেষ্টা করুন" android:backgroundTint="#8AB4F8" android:textColor="#000000" android:layout_marginTop="20dp" android:padding="12dp"/>
              </LinearLayout>
          </RelativeLayout>
          EOF

          # ব্যাকগ্রাউন্ড গ্রেডিয়েন্ট
          cat <<EOF > app/src/main/res/drawable/gradient_bg.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
              <gradient android:startColor="#1a1c1e" android:endColor="#0A0A0A" android:angle="135"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/values/themes.xml
          <resources><style name="Theme.GeminiAi" parent="Theme.MaterialComponents.DayNight.NoActionBar">
          <item name="android:statusBarColor">#1a1c1e</item></style></resources>
          EOF
          
          # Gemini Logo
          curl -L "https://www.gstatic.com/lamda/images/favicon_v1_150160d13988652c75427.png" -o app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          cp app/src/main/res/mipmap-xxxhdpi/ic_launcher.png app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png

          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/><uses-permission android:name="android.permission.RECORD_AUDIO"/><uses-permission android:name="android.permission.CAMERA"/><uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS"/><uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>
              <application android:label="Gemini" android:icon="@mipmap/ic_launcher" android:roundIcon="@mipmap/ic_launcher_round" android:theme="@style/Theme.GeminiAi" android:hardwareAccelerated="true">
                  <activity android:name=".MainActivity" android:exported="true" android:configChanges="orientation|screenSize" android:screenOrientation="portrait">
                      <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Build with Gradle
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Gemini-Pro-Ultimate
          path: app/build/outputs/apk/release/app-release-unsigned.apk
