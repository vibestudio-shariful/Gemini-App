name: Auto Project Setup and Build

on:
  push:
    branches: [ main ]
  workflow_dispatch: # ম্যানুয়ালি রান করার অপশন

permissions:
  contents: write

jobs:
  setup_and_build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      # ধাপ ১: প্রজেক্ট স্ট্রাকচার তৈরি (যদি না থাকে)
      - name: Initialize Project Structure
        run: |
          if [ ! -f "pubspec.yaml" ]; then
            flutter create --project-name=gemini_ai_pro --org=com.ai.gemini --platforms android .
          fi
          
          # অ্যান্ড্রয়েড ভার্সন ফিক্স (৮.১ এর জন্য)
          sed -i 's/minSdkVersion .*/minSdkVersion 21/' android/app/build.gradle
          sed -i 's/targetSdkVersion .*/targetSdkVersion 33/' android/app/build.gradle
          
          # প্রয়োজনীয় প্যাকেজ যোগ করা
          flutter pub add google_generative_ai flutter_markdown google_fonts

      # ধাপ ২: প্রফেশনাল Gemini AI কোড ইনজেক্ট করা
      - name: Create Main Dart File
        run: |
          mkdir -p lib
          cat <<EOF > lib/main.dart
          import 'package:flutter/material.dart';
          import 'package:google_generative_ai/google_generative_ai.dart';
          import 'package:flutter_markdown/flutter_markdown.dart';

          void main() => runApp(const GeminiApp());

          class GeminiApp extends StatelessWidget {
            const GeminiApp({super.key});
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                debugShowCheckedModeBanner: false,
                theme: ThemeData.dark(useMaterial3: true),
                home: const ChatScreen(),
              );
            }
          }

          class ChatScreen extends StatefulWidget {
            const ChatScreen({super.key});
            @override
            State<ChatScreen> createState() => _ChatScreenState();
          }

          class _ChatScreenState extends State<ChatScreen> {
            final String apiKey = "AIzaSyC6TBcU9Ur6kx4cmF_A5qxUb2R1JPqKo3Y";
            late final GenerativeModel model;
            late final ChatSession chat;
            final TextEditingController _controller = TextEditingController();
            final List<Content> _history = [];
            bool _loading = false;

            @override
            void initState() {
              super.initState();
              model = GenerativeModel(model: 'gemini-1.5-flash', apiKey: apiKey);
              chat = model.startChat();
            }

            void _send() async {
              if (_controller.text.isEmpty) return;
              final text = _controller.text;
              setState(() { _history.add(Content.text(text)); _loading = true; });
              _controller.clear();
              final response = await chat.sendMessage(Content.text(text));
              setState(() {
                _history.add(Content.model([TextPart(response.text ?? "Error")]));
                _loading = false;
              });
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(title: const Text("Gemini AI Pro")),
                body: Column(
                  children: [
                    Expanded(child: ListView.builder(
                      itemCount: _history.length,
                      itemBuilder: (context, i) => Padding(
                        padding: const EdgeInsets.all(12),
                        child: MarkdownBody(data: _history[i].parts.whereType<TextPart>().map((e)=>e.text).join()),
                      ),
                    )),
                    if (_loading) const LinearProgressIndicator(),
                    Padding(
                      padding: const EdgeInsets.all(12),
                      child: Row(
                        children: [
                          Expanded(child: TextField(controller: _controller, decoration: const InputDecoration(hintText: "Ask Gemini..."))),
                          IconButton(icon: const Icon(Icons.send), onPressed: _send),
                        ],
                      ),
                    ),
                  ],
                ),
              );
            }
          }
          EOF

      # ধাপ ৩: সব ফাইল রিপোজিটরিতে সেভ (Push) করা
      - name: Commit and Save Project
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Auto-generated Full Project Structure with Gemini Pro" || echo "No changes"
          git push

      # ধাপ ৪: এপিকে বিল্ড করা
      - name: Build Debug APK
        run: flutter build apk --debug

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Gemini-AI-Full-App
          path: build/app/outputs/flutter-apk/app-debug.apk
