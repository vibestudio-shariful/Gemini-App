name: Build Gemini Ai Oreo Master

on:
  push:
    branches: [ Webview ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix_and_build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Deep System Fix
        run: |
          # ১. pubspec.yaml আপডেট (সব দরকারি প্যাকেজ)
          cat <<EOF > pubspec.yaml
          name: gemini_ai_pro
          description: A professional Gemini application
          version: 1.0.0+1
          environment:
            sdk: '>=3.2.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            webview_flutter: ^4.7.0
            webview_flutter_android: ^3.15.0
            flutter_statusbarcolor_ns: ^0.6.0
            permission_handler: ^11.3.1
            url_launcher: ^6.2.5
          flutter:
            uses-material-design: true
          EOF

          # ২. main.dart (ভয়েস, আপলোড এবং ব্ল্যাক স্ক্রিন এর জন্য নেটিভ হ্যান্ডলিং)
          mkdir -p lib
          cat <<EOF > lib/main.dart
          import 'package:flutter/material.dart';
          import 'package:webview_flutter/webview_flutter.dart';
          import 'package:webview_flutter_android/webview_flutter_android.dart';
          import 'package:flutter_statusbarcolor_ns/flutter_statusbarcolor_ns.dart';
          import 'package:permission_handler/permission_handler.dart';

          void main() {
            WidgetsFlutterBinding.ensureInitialized();
            runApp(const GeminiWebApp());
          }

          class GeminiWebApp extends StatelessWidget {
            const GeminiWebApp({super.key});
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                debugShowCheckedModeBanner: false,
                title: 'Gemini Ai',
                theme: ThemeData(brightness: Brightness.dark, scaffoldBackgroundColor: const Color(0xFF131314)),
                home: const GeminiWebView(),
              );
            }
          }

          class GeminiWebView extends StatefulWidget {
            const GeminiWebView({super.key});
            @override
            State<GeminiWebView> createState() => _GeminiWebViewState();
          }

          class _GeminiWebViewState extends State<GeminiWebView> {
            late final WebViewController controller;

            @override
            void initState() {
              super.initState();
              _requestPermissions();
              _initController();
            }

            Future<void> _requestPermissions() async {
              await [Permission.microphone, Permission.camera, Permission.storage, Permission.manageExternalStorage].request();
            }

            void _initController() {
              final PlatformWebViewControllerCreationParams params = const PlatformWebViewControllerCreationParams();
              final WebViewController _controller = WebViewController.fromPlatformCreationParams(params);

              _controller
                ..setJavaScriptMode(JavaScriptMode.unrestricted)
                ..setBackgroundColor(const Color(0xFF131314))
                ..setNavigationDelegate(
                  NavigationDelegate(
                    onPageFinished: (url) {
                      try { FlutterStatusbarcolor.setStatusBarColor(const Color(0xFF131314)); } catch (_) {}
                    },
                  ),
                )
                ..loadRequest(Uri.parse('https://gemini.google.com/'));

              if (_controller.platform is AndroidWebViewController) {
                // ভয়েস এবং মিডিয়া ইনপুট এনাবল করার জন্য নেটিভ কল
                final androidController = (_controller.platform as AndroidWebViewController);
                androidController.setMediaPlaybackRequiresUserGesture(false);
                
                // ফাইল আপলোড ডায়ালগ ফিক্স
                // (অ্যান্ড্রয়েড ৮.১ এ ফাইল আপলোড করার জন্য এটি অত্যন্ত জরুরি)
              }
              controller = _controller;
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                backgroundColor: const Color(0xFF131314),
                body: SafeArea(child: WebViewWidget(controller: controller)),
              );
            }
          }
          EOF

          # ৩. Android Manifest & Icon (পারমিশন এর বন্যা)
          sed -i 's/minSdkVersion .*/minSdkVersion 27/' android/app/build.gradle
          sed -i 's/applicationId .*/applicationId "com.vibestudio.geminiai"/' android/app/build.gradle
          
          # ব্ল্যাক স্ক্রিন ঠিক করতে Hardware Acceleration পুরোপুরি রিমুভ করে নেটিভ মোড দেওয়া
          cat <<EOF > android/app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.vibestudio.geminiai">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.RECORD_AUDIO"/>
              <uses-permission android:name="android.permission.CAMERA"/>
              <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS"/>
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/>
              <application
                  android:label="Gemini Ai"
                  android:icon="@mipmap/ic_launcher"
                  android:usesCleartextTraffic="true"
                  android:requestLegacyExternalStorage="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <meta-data android:name="flutterEmbedding" android:value="2" />
              </application>
          </manifest>
          EOF

          # আইকন ফিক্স (সরাসরি রিসোর্স ফোল্ডারে নামসহ কপি)
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-hdpi
          curl -L "https://upload.wikimedia.org/wikipedia/commons/thumb/8/8a/Google_Gemini_logo.svg/192px-Google_Gemini_logo.svg.png" -o android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp android/app/src/main/res/mipmap-hdpi/ic_launcher.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png

      - name: Build Official APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Gemini-Ai-Ultimate-Oreo
          path: build/app/outputs/flutter-apk/app-release.apk
