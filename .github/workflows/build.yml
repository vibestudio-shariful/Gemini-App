name: Gemini App Oreo Fix Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix_and_build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      # এই অংশটি আপনার রিপোজিটরির ফাইলগুলোকে ৮.১ এর উপযোগী করে বদলে দেবে
      - name: Force Fix Android Configuration
        run: |
          # SDK Versions Fix
          sed -i 's/compileSdkVersion .*/compileSdkVersion 33/' android/app/build.gradle
          sed -i 's/targetSdkVersion .*/targetSdkVersion 33/' android/app/build.gradle
          sed -i 's/minSdkVersion .*/minSdkVersion 21/' android/app/build.gradle
          
          # namespace এবং applicationId হুবহু ম্যাচ করানো
          sed -i 's/namespace .*/namespace "com.vibestudio.gemini"/' android/app/build.gradle
          sed -i 's/applicationId .*/applicationId "com.vibestudio.gemini"/' android/app/build.gradle
          
          # MultiDex এনাবল করা (ইন্সটল এরর কমাতে)
          sed -i '/defaultConfig {/a \        multiDexEnabled true' android/app/build.gradle

      - name: Get Dependencies
        run: flutter pub get

      - name: Build Optimized Release APK
        run: |
          flutter build apk --release \
          --no-tree-shake-icons \
          --target-platform android-arm,android-arm64

      - name: Upload Gemini Fixed APK
        uses: actions/upload-artifact@v4
        with:
          name: Gemini-Oreo-Ready
          path: build/app/outputs/flutter-apk/app-release.apk
