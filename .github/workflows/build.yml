name: Build Optimized Gemini AI APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Get Dependencies
        run: flutter pub get

      # সাইজ কমানোর জন্য পারফেক্ট বিল্ড কমান্ড
      - name: Build Optimized Release APK
        run: flutter build apk --release --no-tree-shake-icons

      # এখানে পাথটি ফিক্স করা হয়েছে যেন গিটহাব ফাইলটি খুঁজে পায়
      - name: Upload Gemini Optimized APK
        uses: actions/upload-artifact@v4
        with:
          name: Gemini-AI-Release
          path: build/app/outputs/flutter-apk/app-release.apk
