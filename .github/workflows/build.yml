name: Sure-Fix and Build Gemini App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix_and_build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      # ধাপ ১: রিপোজিটরির হার্ডওয়্যার লেভেল ফিক্স (Sure Fix)
      - name: Fix Repository Structure
        run: |
          # সব ক্যাশ ক্লিন করা
          flutter clean
          
          # ১. অ্যান্ড্রয়েড বিল্ড ফাইলে সঠিক প্যাকেজ নাম বসানো
          sed -i 's/applicationId .*/applicationId "com.vibestudio.gemini"/' android/app/build.gradle
          sed -i 's/namespace .*/namespace "com.vibestudio.gemini"/' android/app/build.gradle
          
          # ২. অ্যান্ড্রয়েড ভার্সন ফিক্স (৮.১ এর জন্য পারফেক্ট)
          sed -i 's/minSdkVersion .*/minSdkVersion 21/' android/app/build.gradle
          sed -i 's/targetSdkVersion .*/targetSdkVersion 33/' android/app/build.gradle
          sed -i 's/compileSdkVersion .*/compileSdkVersion 33/' android/app/build.gradle
          
          # ৩. MainActivity এর পাথ ফিক্স (Kotlin ফাইলের ভেতরের প্যাকেজ নাম ঠিক করা)
          find android/app/src/main/kotlin -name "MainActivity.kt" -exec sed -i 's/package .*/package com.vibestudio.gemini/' {} +
          
          # ৪. Manifest ফাইলে ক্র্যাশ ফিক্স (Internet ও মেমোরি পারমিশন)
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET"/>' android/app/src/main/AndroidManifest.xml
          sed -i 's/<application/<application android:usesCleartextTraffic="true" android:largeHeap="true"/' android/app/src/main/AndroidManifest.xml

      - name: Get Dependencies
        run: flutter pub get

      # ধাপ ২: অপ্টিমাইজড রিলিজ বিল্ড
      - name: Build Final Stable APK
        run: |
          flutter build apk --release \
          --no-tree-shake-icons \
          --target-platform android-arm,android-arm64

      - name: Upload Gemini App
        uses: actions/upload-artifact@v4
        with:
          name: Gemini-Pro-Final
          path: build/app/outputs/flutter-apk/app-release.apk
