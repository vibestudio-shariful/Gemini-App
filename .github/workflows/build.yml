name: Build Gemini Ultimate Official

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix_and_build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Inject Pro UI and Force Fix
        run: |
          # ১. pubspec.yaml আপডেট
          cat <<EOF > pubspec.yaml
          name: gemini_ai_pro
          description: A professional Gemini clone for Android 8.1
          version: 1.0.0+1
          environment:
            sdk: '>=3.2.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            google_generative_ai: ^0.4.0
            flutter_markdown: ^0.7.1
            google_fonts: ^6.1.0
            image_picker: ^1.1.0
            shimmer: ^3.0.0
          flutter:
            uses-material-design: true
          EOF

          # ২. main.dart ফাইলে প্রোফাইল এবং সেটিংস যোগ করা
          mkdir -p lib
          cat <<EOF > lib/main.dart
          import 'dart:io';
          import 'package:flutter/material.dart';
          import 'package:google_generative_ai/google_generative_ai.dart';
          import 'package:flutter_markdown/flutter_markdown.dart';
          import 'package:google_fonts/google_fonts.dart';
          import 'package:image_picker/image_picker.dart';
          import 'package:shimmer/shimmer.dart';

          void main() => runApp(const GeminiPro());

          class GeminiPro extends StatelessWidget {
            const GeminiPro({super.key});
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                debugShowCheckedModeBanner: false,
                theme: ThemeData(
                  useMaterial3: true,
                  brightness: Brightness.dark,
                  scaffoldBackgroundColor: const Color(0xFF131314),
                  colorSchemeSeed: const Color(0xFF4285F4),
                ),
                home: const GeminiHome(),
              );
            }
          }

          class GeminiHome extends StatefulWidget {
            const GeminiHome({super.key});
            @override
            State<GeminiHome> createState() => _GeminiHomeState();
          }

          class _GeminiHomeState extends State<GeminiHome> {
            final String apiKey = "AIzaSyC6TBcU9Ur6kx4cmF_A5qxUb2R1JPqKo3Y";
            late final GenerativeModel model;
            late ChatSession chat;
            final TextEditingController _controller = TextEditingController();
            final List<Map<String, dynamic>> _messages = [];
            bool _isLoading = false;
            File? _image;

            @override
            void initState() {
              super.initState();
              model = GenerativeModel(model: 'gemini-1.5-flash', apiKey: apiKey);
              chat = model.startChat();
            }

            void _send() async {
              if (_controller.text.isEmpty && _image == null) return;
              final text = _controller.text;
              final image = _image;
              setState(() { _messages.add({"isUser": true, "text": text, "image": image}); _isLoading = true; _image = null; });
              _controller.clear();
              try {
                final content = image != null 
                    ? [Content.multi([TextPart(text), DataPart('image/jpeg', await image.readAsBytes())])]
                    : [Content.text(text)];
                final response = await chat.sendMessage(content.first);
                setState(() { _messages.add({"isUser": false, "text": response.text}); _isLoading = false; });
              } catch (e) { setState(() { _messages.add({"isUser": false, "text": "Error: \$e"}); _isLoading = false; }); }
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(
                  title: const Text("Gemini", style: TextStyle(fontWeight: FontWeight.bold, color: Colors.white70)),
                  centerTitle: true, backgroundColor: const Color(0xFF131314),
                  leading: IconButton(icon: const Icon(Icons.history_rounded), onPressed: () {}),
                  actions: [
                    IconButton(
                      icon: const CircleAvatar(radius: 14, child: Icon(Icons.person, size: 18)),
                      onPressed: () => _showProfileDialog(context),
                    )
                  ],
                ),
                body: Column(
                  children: [
                    Expanded(child: _messages.isEmpty ? _buildWelcome() : ListView.builder(itemCount: _messages.length, itemBuilder: (context, i) => _buildBubble(_messages[i]))),
                    if (_isLoading) _buildShimmer(),
                    _buildInput(),
                  ],
                ),
              );
            }

            void _showProfileDialog(context) {
              showDialog(context: context, builder: (context) => AlertDialog(
                backgroundColor: const Color(0xFF202124),
                title: const Text("Account"),
                content: const Column(mainAxisSize: MainAxisSize.min, children: [
                  CircleAvatar(radius: 30, child: Icon(Icons.person, size: 40)),
                  SizedBox(height: 10),
                  Text("Shariful Islam", style: TextStyle(fontWeight: FontWeight.bold)),
                  Text("shariful@gmail.com", style: TextStyle(color: Colors.grey, fontSize: 12)),
                ]),
                actions: [TextButton(onPressed: () => Navigator.pop(context), child: const Text("Sign Out"))],
              ));
            }

            Widget _buildWelcome() => Center(child: Column(mainAxisAlignment: MainAxisAlignment.center, children: [
              Shimmer.fromColors(baseColor: const Color(0xFF4285F4), highlightColor: const Color(0xFF91B9F8), child: const Icon(Icons.auto_awesome, size: 80)),
              const SizedBox(height: 20),
              const Text("শুভ সকাল, শরিফুল", style: TextStyle(fontSize: 26, fontWeight: FontWeight.bold)),
              const Text("আমি আজ আপনাকে সাহায্য করতে প্রস্তুত।", style: TextStyle(color: Colors.grey)),
            ]));

            Widget _buildBubble(Map<String, dynamic> msg) {
              bool isUser = msg['isUser'];
              return Padding(padding: const EdgeInsets.symmetric(vertical: 10, horizontal: 15), child: Row(crossAxisAlignment: CrossAxisAlignment.start, children: [
                if (!isUser) const Icon(Icons.auto_awesome, size: 20, color: Color(0xFF4285F4)),
                const SizedBox(width: 10),
                Flexible(child: Container(padding: const EdgeInsets.all(12), decoration: BoxDecoration(color: isUser ? const Color(0xFF202124) : Colors.transparent, borderRadius: BorderRadius.circular(15)),
                child: Column(crossAxisAlignment: CrossAxisAlignment.start, children: [
                  if (msg['image'] != null) ClipRRect(borderRadius: BorderRadius.circular(10), child: Image.file(msg['image'], width: 200)),
                  MarkdownBody(data: msg['text'] ?? "", styleSheet: MarkdownStyleSheet(p: const TextStyle(fontSize: 16, color: Colors.white))),
                ]))),
              ]));
            }

            Widget _buildShimmer() => Padding(padding: const EdgeInsets.all(15), child: Shimmer.fromColors(baseColor: const Color(0xFF202124), highlightColor: const Color(0xFF303134), child: Container(height: 20, width: double.infinity, color: Colors.white)));

            Widget _buildInput() => Container(margin: const EdgeInsets.all(15), decoration: BoxDecoration(color: const Color(0xFF202124), borderRadius: BorderRadius.circular(30)),
              child: Row(children: [
                IconButton(icon: const Icon(Icons.add_photo_alternate_outlined, color: Color(0xFF8AB4F8)), onPressed: () async {
                  final file = await ImagePicker().pickImage(source: ImageSource.gallery);
                  if (file != null) setState(() => _image = File(file.path));
                }),
                Expanded(child: TextField(controller: _controller, decoration: const InputDecoration(hintText: "Ask Gemini...", border: InputBorder.none, hintStyle: TextStyle(color: Colors.grey)))),
                IconButton(icon: const Icon(Icons.send_rounded, color: Color(0xFF8AB4F8)), onPressed: _send),
              ]));
          }
          EOF

          # ৩. গ্রেডল এবং অ্যান্ড্রয়েড হার্ড ফিক্স (ইন্সটল এরর এড়াতে)
          sed -i 's/minSdkVersion .*/minSdkVersion 21/' android/app/build.gradle
          sed -i 's/targetSdkVersion .*/targetSdkVersion 33/' android/app/build.gradle
          sed -i 's/applicationId .*/applicationId "com.vibestudio.gemini"/' android/app/build.gradle
          # গ্রেডল ডাউনলোড সোর্স পরিবর্তন
          sed -i 's|distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-7.6.1-all.zip|' android/gradle/wrapper/gradle-wrapper.properties

      - name: Build Optimized Release APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload Gemini Ultimate APK
        uses: actions/upload-artifact@v4
        with:
          name: Gemini-Ultimate-Pro
          path: build/app/outputs/flutter-apk/app-release.apk
