name: Build Gemini Pro Ultimate Dynamic

on:
  push:
    branches: [ Webview ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Native Project Structure
        run: |
          echo "include ':app'" > settings.gradle
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { 
                  classpath "com.android.tools.build:gradle:8.2.2"
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.22"
              }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          mkdir -p app/src/main/java/com/vibestudio/geminiai
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-anydpi-v26
          for res in mdpi hdpi xhdpi xxhdpi xxxhdpi; do mkdir -p app/src/main/res/mipmap-\$res; done

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application'; id 'org.jetbrains.kotlin.android' }
          android {
              namespace 'com.vibestudio.geminiai'
              compileSdk 34
              defaultConfig {
                  applicationId "com.vibestudio.geminiai"
                  minSdk 27
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              aaptOptions { cruncherEnabled = false; useNewCruncher = false }
              compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
              kotlinOptions { jvmTarget = '17' }
          }
          dependencies {
              implementation "androidx.appcompat:appcompat:1.6.1"
              implementation "com.google.android.material:material:1.9.0"
          }
          EOF

          # MainActivity.kt (Dynamic Status Bar & Anti-Zoom Fix)
          cat <<EOF > app/src/main/java/com/vibestudio/geminiai/MainActivity.kt
          package com.vibestudio.geminiai
          import android.Manifest
          import android.content.Intent
          import android.graphics.Color
          import android.net.Uri
          import android.os.Build
          import android.os.Bundle
          import android.view.View
          import android.view.WindowInsetsController
          import android.webkit.*
          import android.widget.*
          import androidx.appcompat.app.AppCompatActivity
          import androidx.core.app.ActivityCompat

          class MainActivity : AppCompatActivity() {
              private lateinit var webView: WebView
              private var fileCallback: ValueCallback<Array<Uri>>? = null

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_main)
                  
                  webView = findViewById(R.id.webView)
                  val splash = findViewById<View>(R.id.custom_splash)

                  ActivityCompat.requestPermissions(this, arrayOf(
                      Manifest.permission.RECORD_AUDIO, 
                      Manifest.permission.CAMERA,
                      Manifest.permission.MODIFY_AUDIO_SETTINGS
                  ), 1)

                  setupWebView()
                  webView.loadUrl("https://gemini.google.com/")
              }

              private fun setupWebView() {
                  webView.settings.apply {
                      javaScriptEnabled = true
                      domStorageEnabled = true
                      mediaPlaybackRequiresUserGesture = false
                      allowFileAccess = true
                      setSupportZoom(false)
                      builtInZoomControls = false
                      useWideViewPort = true
                      loadWithOverviewMode = true
                      userAgentString = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36"
                  }

                  webView.webViewClient = object : WebViewClient() {
                      override fun onPageFinished(view: WebView?, url: String?) {
                          // Anti-Zoom & Theme Syncing JS
                          view?.loadUrl("javascript:(function() { " +
                                  "var meta = document.createElement('meta');" +
                                  "meta.name = 'viewport';" +
                                  "meta.content = 'width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no';" +
                                  "document.getElementsByTagName('head')[0].appendChild(meta);" +
                                  "})()")
                          
                          findViewById<View>(R.id.custom_splash).animate().alpha(0f).setDuration(1000).withEndAction {
                              findViewById<View>(R.id.custom_splash).visibility = View.GONE
                              webView.visibility = View.VISIBLE
                          }
                          updateStatusBarColor()
                      }
                  }
                  
                  webView.webChromeClient = object : WebChromeClient() {
                      override fun onPermissionRequest(request: PermissionRequest) {
                          request.grant(request.resources)
                      }
                  }
              }

              private fun updateStatusBarColor() {
                  // ওরিও ফোনে স্ট্যাটাস বার কালার হ্যান্ডলিং
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.LOLLIPOP) {
                      window.statusBarColor = Color.parseColor("#131314") // Default Dark
                  }
              }

              override fun onBackPressed() { if(webView.canGoBack()) webView.goBack() else super.onBackPressed() }
          }
          EOF

          # UI Design with Advanced Loading
          cat <<EOF > app/src/main/res/layout/activity_main.xml
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent" android:background="#131314">
              
              <WebView android:id="@+id/webView" android:layout_width="match_parent" android:layout_height="match_parent" android:visibility="gone"/>
              
              <LinearLayout android:id="@+id/custom_splash" android:layout_width="match_parent" android:layout_height="match_parent"
                  android:gravity="center" android:orientation="vertical" android:background="#131314">
                  
                  <ImageView android:id="@+id/splash_logo" android:layout_width="100dp" android:layout_height="100dp" 
                      android:src="@mipmap/ic_launcher" android:layout_marginBottom="30dp"/>
                  
                  <ProgressBar android:layout_width="45dp" android:layout_height="45dp"
                      style="@android:style/Widget.Material.ProgressBar.Small"
                      android:indeterminateTint="#4285F4" android:layout_marginTop="20dp"/>
                      
                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" 
                      android:text="Processing..." android:textColor="#808080" android:textSize="14sp"
                      android:layout_marginTop="15dp" android:letterSpacing="0.2"/>
              </LinearLayout>
          </RelativeLayout>
          EOF

          cat <<EOF > app/src/main/res/values/themes.xml
          <resources><style name="Theme.GeminiAi" parent="Theme.MaterialComponents.DayNight.NoActionBar">
