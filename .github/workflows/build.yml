name: Build Gemini Pro Advanced UI

on:
  push:
    branches: [ Webview ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Native Project Structure
        run: |
          echo "include ':app'" > settings.gradle
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { 
                  classpath "com.android.tools.build:gradle:8.2.2"
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.22"
              }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          mkdir -p app/src/main/java/com/vibestudio/geminiai
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-anydpi-v26

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application'; id 'org.jetbrains.kotlin.android' }
          android {
              namespace 'com.vibestudio.geminiai'
              compileSdk 34
              defaultConfig {
                  applicationId "com.vibestudio.geminiai"
                  minSdk 27
                  targetSdk 34
                  versionCode 3
                  versionName "1.2"
              }
              buildTypes { release { minifyEnabled false } }
              compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
              kotlinOptions { jvmTarget = '17' }
          }
          dependencies {
              implementation "androidx.appcompat:appcompat:1.6.1"
              implementation "com.google.android.material:material:1.9.0"
          }
          EOF

          # MainActivity.kt (Offline Support & Download Popup)
          cat <<EOF > app/src/main/java/com/vibestudio/geminiai/MainActivity.kt
          package com.vibestudio.geminiai
          import android.Manifest
          import android.app.AlertDialog
          import android.app.DownloadManager
          import android.content.Context
          import android.content.Intent
          import android.graphics.Color
          import android.net.Uri
          import android.os.*
          import android.view.View
          import android.view.WindowManager
          import android.webkit.*
          import android.widget.*
          import androidx.appcompat.app.AppCompatActivity
          import androidx.core.app.ActivityCompat

          class MainActivity : AppCompatActivity() {
              private lateinit var webView: WebView
              private lateinit var offlineLayout: LinearLayout
              private lateinit var splash: View
              private var fileCallback: ValueCallback<Array<Uri>>? = null

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_main)
                  
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.LOLLIPOP) {
                      window.statusBarColor = Color.parseColor("#131314")
                  }

                  webView = findViewById(R.id.webView)
                  offlineLayout = findViewById(R.id.offline_layout)
                  splash = findViewById(R.id.custom_splash)

                  ActivityCompat.requestPermissions(this, arrayOf(
                      Manifest.permission.RECORD_AUDIO, Manifest.permission.CAMERA,
                      Manifest.permission.WRITE_EXTERNAL_STORAGE
                  ), 1)

                  setupWebView()
                  
                  findViewById<Button>(R.id.retry_btn).setOnClickListener {
                      offlineLayout.visibility = View.GONE
                      splash.visibility = View.VISIBLE
                      webView.reload()
                  }

                  webView.loadUrl("https://gemini.google.com/")
              }

              private fun setupWebView() {
                  webView.settings.apply {
                      javaScriptEnabled = true
                      domStorageEnabled = true
                      allowFileAccess = true
                      databaseEnabled = true
                      setSupportZoom(false)
                      userAgentString = "Mozilla/5.0 (Linux; Android 13; SM-S918B) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Mobile Safari/537.36"
                  }

                  webView.webViewClient = object : WebViewClient() {
                      override fun onPageFinished(view: WebView?, url: String?) {
                          splash.animate().alpha(0f).setDuration(800).withEndAction {
                              splash.visibility = View.GONE
                              webView.visibility = View.VISIBLE
                          }
                      }
                      override fun onReceivedError(v: WebView?, r: WebResourceRequest?, e: WebResourceError?) {
                          webView.visibility = View.GONE
                          offlineLayout.visibility = View.VISIBLE
                          splash.visibility = View.GONE
                      }
                  }

                  // DOWNLOAD POPUP LOGIC
                  webView.setDownloadListener { url, userAgent, contentDisposition, mimetype, _ ->
                      AlertDialog.Builder(this)
                          .setTitle("Download File")
                          .setMessage("Do you want to download this file?")
                          .setPositiveButton("Download") { _, _ ->
                              val request = DownloadManager.Request(Uri.parse(url))
                              request.setMimeType(mimetype)
                              request.addRequestHeader("User-Agent", userAgent)
                              request.setTitle(URLUtil.guessFileName(url, contentDisposition, mimetype))
                              request.setNotificationVisibility(DownloadManager.Request.VISIBILITY_VISIBLE_NOTIFY_COMPLETED)
                              request.setDestinationInExternalPublicDir(Environment.DIRECTORY_DOWNLOADS, URLUtil.guessFileName(url, contentDisposition, mimetype))
                              (getSystemService(Context.DOWNLOAD_SERVICE) as DownloadManager).enqueue(request)
                              Toast.makeText(this, "Downloading...", Toast.LENGTH_SHORT).show()
                          }
                          .setNegativeButton("Cancel", null)
                          .show()
                  }

                  webView.webChromeClient = object : WebChromeClient() {
                      override fun onPermissionRequest(req: PermissionRequest) { req.grant(req.resources) }
                      override fun onShowFileChooser(w: WebView?, f: ValueCallback<Array<Uri>>?, c: FileChooserParams?): Boolean {
                          fileCallback = f
                          startActivityForResult(c?.createIntent()!!, 100)
                          return true
                      }
                  }
              }

              override fun onActivityResult(requestCode: Int, resultCode: Int, data: Intent?) {
                  super.onActivityResult(requestCode, resultCode, data)
                  if (requestCode == 100) {
                      fileCallback?.onReceiveValue(WebChromeClient.FileChooserParams.parseResult(resultCode, data))
                      fileCallback = null
                  }
              }

              override fun onBackPressed() { if(webView.canGoBack()) webView.goBack() else super.onBackPressed() }
          }
          EOF

          # Design: Pulse Animation Drawable
          cat <<EOF > app/src/main/res/drawable/ic_gemini_logo.xml
          <vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="100dp" android:height="100dp" android:viewportWidth="24" android:viewportHeight="24">
              <path android:fillColor="#4285F4" android:pathData="M12,2L14.5,9.5L22,12L14.5,14.5L12,22L9.5,14.5L2,12L9.5,9.5L12,2Z"/>
          </vector>
          EOF

          # Layout with Offline UI and Pulse Loader
          cat <<EOF > app/src/main/res/layout/activity_main.xml
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#131314">
              <WebView android:id="@+id/webView" android:layout_width="match_parent" android:layout_height="match_parent" android:visibility="gone"/>
              
              <LinearLayout android:id="@+id/offline_layout" android:layout_width="match_parent" android:layout_height="match_parent" android:gravity="center" android:orientation="vertical" android:visibility="gone">
                  <ImageView android:layout_width="80dp" android:layout_height="80dp" android:src="@drawable/ic_gemini_logo" android:alpha="0.3"/>
                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Offline" android:textColor="#FFFFFF" android:textSize="20sp" android:layout_marginTop="20dp"/>
                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Please check your connection" android:textColor="#808080" android:layout_marginTop="8dp"/>
                  <Button android:id="@+id/retry_btn" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Retry" android:layout_marginTop="30dp" android:backgroundTint="#4285F4"/>
              </LinearLayout>

              <LinearLayout android:id="@+id/custom_splash" android:layout_width="match_parent" android:layout_height="match_parent" android:gravity="center" android:orientation="vertical" android:background="#131314">
                  <ImageView android:layout_width="100dp" android:layout_height="100dp" android:src="@drawable/ic_gemini_logo"/>
                  <ProgressBar android:layout_width="40dp" android:layout_height="40dp" android:layout_marginTop="50dp" android:indeterminateTint="#4285F4"/>
              </LinearLayout>
          </RelativeLayout>
          EOF

          echo "<resources><style name='Theme.GeminiAi' parent='Theme.MaterialComponents.DayNight.NoActionBar'><item name='android:statusBarColor'>#131314</item></style></resources>" > app/src/main/res/values/themes.xml

          cat <<EOF > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android"><background android:drawable="@android:color/black"/><foreground android:drawable="@drawable/ic_gemini_logo"/></adaptive-icon>
          EOF
          cp app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml

          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/><uses-permission android:name="android.permission.RECORD_AUDIO"/><uses-permission android:name="android.permission.CAMERA"/><uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/>
              <application android:label="Gemini Pro" android:icon="@drawable/ic_gemini_logo" android:roundIcon="@drawable/ic_gemini_logo" android:theme="@style/Theme.GeminiAi">
                  <activity android:name=".MainActivity" android:exported="true" android:screenOrientation="portrait" android:configChanges="orientation|screenSize">
                      <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Build with Gradle
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Gemini-Pro-v1.2
          path: app/build/outputs/apk/release/app-release-unsigned.apk
