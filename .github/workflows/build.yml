name: Build Gemini Pro Final Fix

on:
  push:
    branches: [ Webview ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install ImageMagick
        run: sudo apt-get install -y imagemagick

      - name: Create Native Project Structure
        run: |
          echo "include ':app'" > settings.gradle
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { 
                  classpath "com.android.tools.build:gradle:8.2.2"
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.22"
              }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          mkdir -p app/src/main/java/com/vibestudio/geminiai
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-anydpi-v26
          
          # Fix: Proper directory creation
          for res in mdpi hdpi xhdpi xxhdpi xxxhdpi; do mkdir -p "app/src/main/res/mipmap-$res"; done

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application'; id 'org.jetbrains.kotlin.android' }
          android {
              namespace 'com.vibestudio.geminiai'
              compileSdk 34
              defaultConfig {
                  applicationId "com.vibestudio.geminiai"
                  minSdk 27
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes { release { minifyEnabled false; shrinkResources false } }
              compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
              kotlinOptions { jvmTarget = '17' }
          }
          dependencies {
              implementation "androidx.appcompat:appcompat:1.6.1"
              implementation "com.google.android.material:material:1.9.0"
          }
          EOF

          # MainActivity.kt
          cat <<EOF > app/src/main/java/com/vibestudio/geminiai/MainActivity.kt
          package com.vibestudio.geminiai
          import android.Manifest
          import android.content.Intent
          import android.graphics.Color
          import android.net.Uri
          import android.os.Build
          import android.os.Bundle
          import android.view.View
          import android.view.WindowManager
          import android.webkit.*
          import android.widget.*
          import androidx.appcompat.app.AppCompatActivity
          import androidx.core.app.ActivityCompat

          class MainActivity : AppCompatActivity() {
              private lateinit var webView: WebView
              private var fileCallback: ValueCallback<Array<Uri>>? = null

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_main)
                  
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.LOLLIPOP) {
                      window.addFlags(WindowManager.LayoutParams.FLAG_DRAWS_SYSTEM_BAR_BACKGROUNDS)
                      window.statusBarColor = Color.parseColor("#131314")
                  }

                  webView = findViewById(R.id.webView)
                  val splash = findViewById<View>(R.id.custom_splash)

                  ActivityCompat.requestPermissions(this, arrayOf(
                      Manifest.permission.RECORD_AUDIO, Manifest.permission.CAMERA,
                      Manifest.permission.MODIFY_AUDIO_SETTINGS
                  ), 1)

                  webView.settings.apply {
                      javaScriptEnabled = true
                      domStorageEnabled = true
                      allowFileAccess = true
                      setSupportZoom(false)
                      useWideViewPort = true
                      loadWithOverviewMode = true
                      userAgentString = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36"
                  }

                  webView.webViewClient = object : WebViewClient() {
                      override fun onPageFinished(view: WebView?, url: String?) {
                          view?.loadUrl("javascript:(function() { " +
                                  "var meta = document.createElement('meta');" +
                                  "meta.name = 'viewport';" +
                                  "meta.content = 'width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no';" +
                                  "document.getElementsByTagName('head')[0].appendChild(meta);" +
                                  "})()")
                          splash.animate().alpha(0f).setDuration(1000).withEndAction {
                              splash.visibility = View.GONE
                              webView.visibility = View.VISIBLE
                          }
                      }
                  }
                  
                  webView.webChromeClient = object : WebChromeClient() {
                      override fun onPermissionRequest(req: PermissionRequest) { req.grant(req.resources) }
                  }
                  webView.loadUrl("https://gemini.google.com/")
              }
              override fun onBackPressed() { if(webView.canGoBack()) webView.goBack() else super.onBackPressed() }
          }
          EOF

          # Layout & Themes
          cat <<EOF > app/src/main/res/layout/activity_main.xml
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent" android:background="#131314">
              <WebView android:id="@+id/webView" android:layout_width="match_parent" android:layout_height="match_parent" android:visibility="gone"/>
              <LinearLayout android:id="@+id/custom_splash" android:layout_width="match_parent" android:layout_height="match_parent"
                  android:gravity="center" android:orientation="vertical" android:background="#131314">
                  <ImageView android:layout_width="100dp" android:layout_height="100dp" android:src="@mipmap/ic_launcher" android:layout_marginBottom="30dp"/>
                  <ProgressBar android:layout_width="40dp" android:layout_height="40dp" android:indeterminateTint="#4285F4"/>
              </LinearLayout>
          </RelativeLayout>
          EOF

          echo "<resources><style name='Theme.GeminiAi' parent='Theme.MaterialComponents.DayNight.NoActionBar'><item name='android:statusBarColor'>#131314</item></style></resources>" > app/src/main/res/values/themes.xml

          # Image Processing Fix: Use ImageMagick to clean and resize icon
          curl -L "https://www.gstatic.com/lamda/images/favicon_v1_150160d13988652c75427.png" -o raw_logo.png
          convert raw_logo.png -background none -resize 512x512 -gravity center -extent 512x512 logo.png
          
          for res in mdpi:48x48 hdpi:72x72 xhdpi:96x96 xxhdpi:144x144 xxxhdpi:192x192; do
            size=\${res#*:}
            folder=\${res%:*}
            convert logo.png -resize \$size "app/src/main/res/mipmap-\$folder/ic_launcher.png"
            convert logo.png -resize \$size "app/src/main/res/mipmap-\$folder/ic_launcher_round.png"
          done

          # Adaptive Icon
          cat <<EOF > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@android:color/black"/><foreground android:drawable="@mipmap/ic_launcher"/>
          </adaptive-icon>
          EOF
          cp app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml

          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/><uses-permission android:name="android.permission.RECORD_AUDIO"/><uses-permission android:name="android.permission.CAMERA"/><uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS"/>
              <application android:label="Gemini Pro" android:icon="@mipmap/ic_launcher" android:roundIcon="@mipmap/ic_launcher_round" android:theme="@style/Theme.GeminiAi">
                  <activity android:name=".MainActivity" android:exported="true" android:screenOrientation="portrait">
                      <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Build with Gradle
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Gemini-Pro-Success
          path: app/build/outputs/apk/release/app-release-unsigned.apk
