name: Build Optimized Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Get Dependencies
        run: flutter pub get

      # সাইজ কমানোর জন্য রিলিজ বিল্ড এবং অপ্রয়োজনীয় আইকন রিমুভ
      - name: Build Minified Release APK
        run: |
          flutter build apk --release --split-per-abi --no-tree-shake-icons

      # বিল্ড হওয়া এপিকে আপলোড করা (arm64-v8a সাধারণত লেটেস্ট ফোনে কাজ করে, v7a পুরনো ফোনে)
      - name: Upload Optimized APK
        uses: actions/upload-artifact@v4
        with:
          name: Gemini-AI-Optimized
          path: build/app/outputs/flutter-apk/app-release.apk
