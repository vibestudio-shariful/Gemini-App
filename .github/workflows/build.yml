name: Build Gemini Ai Voice Fix

on:
  push:
    branches: [ Webview ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Native Project Structure
        run: |
          echo "include ':app'" > settings.gradle
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { 
                  classpath "com.android.tools.build:gradle:8.2.2"
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.22"
              }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          mkdir -p app/src/main/java/com/vibestudio/geminiai
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          mkdir -p app/src/main/res/drawable

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application'; id 'org.jetbrains.kotlin.android' }
          android {
              namespace 'com.vibestudio.geminiai'
              compileSdk 34
              defaultConfig {
                  applicationId "com.vibestudio.geminiai"
                  minSdk 27
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              aaptOptions { cruncherEnabled = false; useNewCruncher = false }
              compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
              kotlinOptions { jvmTarget = '17' }
          }
          dependencies {
              implementation "androidx.appcompat:appcompat:1.6.1"
              implementation "com.google.android.material:material:1.9.0"
          }
          EOF

          # MainActivity.kt (Enhanced Permission Handling & Modern UI Logic)
          cat <<EOF > app/src/main/java/com/vibestudio/geminiai/MainActivity.kt
          package com.vibestudio.geminiai
          import android.Manifest
          import android.content.Intent
          import android.net.Uri
          import android.os.Bundle
          import android.view.View
          import android.webkit.*
          import android.widget.*
          import androidx.appcompat.app.AppCompatActivity
          import androidx.core.app.ActivityCompat

          class MainActivity : AppCompatActivity() {
              private lateinit var webView: WebView
              private var fileCallback: ValueCallback<Array<Uri>>? = null

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_main)
                  
                  webView = findViewById(R.id.webView)
                  val splash = findViewById<View>(R.id.custom_splash)

                  // Initial permission request
                  ActivityCompat.requestPermissions(this, arrayOf(
                      Manifest.permission.RECORD_AUDIO, 
                      Manifest.permission.CAMERA,
                      Manifest.permission.MODIFY_AUDIO_SETTINGS,
                      Manifest.permission.READ_EXTERNAL_STORAGE
                  ), 1)

                  webView.settings.apply {
                      javaScriptEnabled = true
                      domStorageEnabled = true
                      mediaPlaybackRequiresUserGesture = false
                      allowFileAccess = true
                      allowContentAccess = true
                      databaseEnabled = true
                      cacheMode = WebSettings.LOAD_DEFAULT
                  }

                  webView.webViewClient = object : WebViewClient() {
                      override fun onPageFinished(view: WebView?, url: String?) {
                          // Smooth fading animation
                          splash.animate().alpha(0f).setDuration(1200).withEndAction {
                              splash.visibility = View.GONE
                              webView.visibility = View.VISIBLE
                          }
                      }
                      override fun onReceivedError(view: WebView?, request: WebResourceRequest?, error: WebResourceError?) {
                          // Handle errors, possibly show offline screen
                      }
                  }
                  
                  webView.webChromeClient = object : WebChromeClient() {
                      // Critical permission request handling
                      override fun onPermissionRequest(request: PermissionRequest) {
                          runOnUiThread {
                              if (request.origin.toString() == "https://gemini.google.com/") {
                                  request.grant(request.resources)
                              } else {
                                  request.deny()
                              }
                          }
                      }

                      // File upload handling
                      override fun onShowFileChooser(w: WebView?, f: ValueCallback<Array<Uri>>?, c: FileChooserParams?): Boolean {
                          fileCallback = f
                          try {
                              val intent = c?.createIntent()
                              startActivityForResult(intent!!, 100)
                          } catch (e: Exception) {
                              fileCallback = null
                              return false
                          }
                          return true
                      }
                  }
                  webView.loadUrl("https://gemini.google.com/")
              }

              override fun onActivityResult(requestCode: Int, resultCode: Int, data: Intent?) {
                  super.onActivityResult(requestCode, resultCode, data)
                  if (requestCode == 100) {
                      fileCallback?.onReceiveValue(WebChromeClient.FileChooserParams.parseResult(resultCode, data))
                      fileCallback = null
                  }
              }
              override fun onBackPressed() { if(webView.canGoBack()) webView.goBack() else super.onBackPressed() }
          }
          EOF

          # Modern UI Design Layout
          cat <<EOF > app/src/main/res/layout/activity_main.xml
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent">
              
              <WebView android:id="@+id/webView" android:layout_width="match_parent" android:layout_height="match_parent" android:visibility="gone"/>
              
              <RelativeLayout android:id="@+id/custom_splash" android:layout_width="match_parent" android:layout_height="match_parent"
                  android:background="@drawable/splash_background" android:gravity="center">
                  
                  <LinearLayout android:layout_width="wrap_content" android:layout_height="wrap_content"
                      android:orientation="vertical" android:gravity="center">
                      
                      <ImageView android:id="@+id/splash_logo" android:layout_width="90dp" android:layout_height="90dp"
                          android:src="@mipmap/ic_launcher" android:contentDescription="@string/app_name"/>
                          
                      <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                          android:text="Gemini Ai" android:textColor="#FFFFFF" android:textSize="32sp"
                          android:textStyle="bold" android:layout_marginTop="20dp" android:elevation="4dp"/>
                          
                      <ProgressBar android:layout_width="45dp" android:layout_height="45dp"
                          android:layout_marginTop="40dp" android:indeterminateTint="#4285F4"/>
                          
                  </LinearLayout>
                  
              </RelativeLayout>
              
          </RelativeLayout>
          EOF

          # Gradient Background for Modern Look
          cat <<EOF > app/src/main/res/drawable/splash_background.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
              <gradient android:startColor="#1a1c1e" android:endColor="#131314" android:angle="135"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/values/themes.xml
          <resources>
              <string name="app_name">Gemini Ai</string>
              <style name="Theme.GeminiAi" parent="Theme.MaterialComponents.DayNight.NoActionBar">
                  <item name="android:statusBarColor">#1a1c1e</item>
                  <item name="android:navigationBarColor">#131314</item>
              </style>
          </resources>
          EOF
          
          curl -L "https://www.gstatic.com/lamda/images/favicon_v1_150160d13988652c75427.png" -o app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          cp app/src/main/res/mipmap-xxxhdpi/ic_launcher.png app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png

          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.RECORD_AUDIO"/>
              <uses-permission android:name="android.permission.CAMERA"/>
              <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS"/>
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>
              <application android:label="@string/app_name" android:icon="@mipmap/ic_launcher" android:roundIcon="@mipmap/ic_launcher_round" android:theme="@style/Theme.GeminiAi" android:hardwareAccelerated="true">
                  <activity android:name=".MainActivity" android:exported="true" android:configChanges="orientation|screenSize" android:screenOrientation="portrait">
                      <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Build with Gradle
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Gemini-Voice-UI-Final
          path: app/build/outputs/apk/release/app-release-unsigned.apk
