name: Build Gemini Pro Final Bridge

on:
  push:
    branches: [ Webview ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Native Project Structure
        run: |
          echo "include ':app'" > settings.gradle
          echo "android.useAndroidX=true" > gradle.properties

          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { 
                  classpath "com.android.tools.build:gradle:8.2.2"
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.22"
              }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          mkdir -p app/src/main/java/com/vibestudio/geminiai
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application'; id 'org.jetbrains.kotlin.android' }
          android {
              namespace 'com.vibestudio.geminiai'
              compileSdk 34
              defaultConfig {
                  applicationId "com.vibestudio.geminiai"
                  minSdk 26
                  targetSdk 34
                  versionCode 11
                  versionName "2.0-Ultimate"
              }
              buildTypes { release { minifyEnabled false } }
              compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
              kotlinOptions { jvmTarget = '17' }
          }
          dependencies {
              implementation "androidx.appcompat:appcompat:1.6.1"
              implementation "com.google.android.material:material:1.9.0"
          }
          EOF

          # MainActivity.kt (Robust Link Interceptor)
          cat <<EOF > app/src/main/java/com/vibestudio/geminiai/MainActivity.kt
          package com.vibestudio.geminiai
          import android.Manifest
          import android.app.DownloadManager
          import android.content.*
          import android.graphics.Color
          import android.net.Uri
          import android.os.*
          import android.util.Base64
          import android.view.View
          import android.webkit.*
          import android.widget.*
          import androidx.appcompat.app.AppCompatActivity
          import androidx.core.app.ActivityCompat
          import java.io.File
          import java.io.FileOutputStream

          class MainActivity : AppCompatActivity() {
              private lateinit var webView: WebView
              private lateinit var splash: View

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_main)
                  window.statusBarColor = Color.parseColor("#131314")
                  
                  webView = findViewById(R.id.webView)
                  splash = findViewById(R.id.custom_splash)

                  ActivityCompat.requestPermissions(this, arrayOf(
                      Manifest.permission.WRITE_EXTERNAL_STORAGE, Manifest.permission.READ_EXTERNAL_STORAGE,
                      Manifest.permission.CAMERA, Manifest.permission.RECORD_AUDIO
                  ), 1)

                  setupWebView()
                  webView.loadUrl("https://gemini.google.com/")
              }

              private fun setupWebView() {
                  webView.settings.apply {
                      javaScriptEnabled = true
                      domStorageEnabled = true
                      allowFileAccess = true
                      setSupportZoom(false)
                      userAgentString = "Mozilla/5.0 (Linux; Android 10; SM-G973F) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Mobile Safari/537.36"
                  }

                  // POWERFUL JS INTERFACE
                  webView.addJavascriptInterface(object : Any() {
                      @JavascriptInterface
                      fun downloadBlob(base64: String, mime: String) {
                          saveFile(base64, mime)
                      }
                  }, "Android")

                  webView.webViewClient = object : WebViewClient() {
                      override fun onPageFinished(v: WebView?, u: String?) {
                          splash.visibility = View.GONE; webView.visibility = View.VISIBLE
                          
                          // এই স্ক্রিপ্টটি ডাউনলোড লিংকে ক্লিক করলেই ডাটা ছিনিয়ে নেবে
                          v?.loadUrl("javascript:(function() { " +
                                  "document.addEventListener('click', function(e) { " +
                                  "  var t = e.target.closest('a'); " +
                                  "  if (t && t.href.startsWith('blob:')) { " +
                                  "    e.preventDefault(); " +
                                  "    var xhr = new XMLHttpRequest(); " +
                                  "    xhr.open('GET', t.href, true); " +
                                  "    xhr.responseType = 'blob'; " +
                                  "    xhr.onload = function() { " +
                                  "      var reader = new FileReader(); " +
                                  "      reader.onloadend = function() { " +
                                  "        Android.downloadBlob(reader.result, xhr.response.type); " +
                                  "      }; " +
                                  "      reader.readAsDataURL(xhr.response); " +
                                  "    }; " +
                                  "    xhr.send(); " +
                                  "  } " +
                                  "}, true); " +
                                  "})()")
                      }
                  }
              }

              private fun saveFile(base64: String, mime: String) {
                  try {
                      val pureBase64 = base64.substring(base64.indexOf(",") + 1)
                      val decoded = Base64.decode(pureBase64, Base64.DEFAULT)
                      val ext = if (mime.contains("png")) "png" else "jpg"
                      val name = "Gemini_\${System.currentTimeMillis()}.\$ext"
                      
                      val file = File(Environment.getExternalStoragePublicDirectory(Environment.DIRECTORY_DOWNLOADS), name)
                      val fos = FileOutputStream(file)
                      fos.write(decoded)
                      fos.close()

                      runOnUiThread { 
                          Toast.makeText(this@MainActivity, "Saved to Downloads!", Toast.LENGTH_LONG).show()
                          // গ্যালারিতে দেখানোর জন্য মিডিয়া স্ক্যান
                          MediaScannerConnection.scanFile(this, arrayOf(file.absolutePath), null, null)
                      }
                  } catch (e: Exception) {
                      runOnUiThread { Toast.makeText(this, "Save Failed: \${e.message}", Toast.LENGTH_SHORT).show() }
                  }
              }

              override fun onBackPressed() {
                  if (webView.canGoBack()) webView.goBack() else finish()
              }
          }
          EOF

          # Simple Dark UI
          cat <<EOF > app/src/main/res/layout/activity_main.xml
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#131314">
              <WebView android:id="@+id/webView" android:layout_width="match_parent" android:layout_height="match_parent" android:visibility="gone"/>
              <LinearLayout android:id="@+id/custom_splash" android:layout_width="match_parent" android:layout_height="match_parent" android:gravity="center" android:background="#131314">
                  <ProgressBar android:layout_width="wrap_content" android:layout_height="wrap_content" android:indeterminateTint="#4285F4"/>
              </LinearLayout>
          </RelativeLayout>
          EOF

          cat <<EOF > app/src/main/res/drawable/ic_gemini_logo.xml
          <vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="100dp" android:height="100dp" android:viewportWidth="24" android:viewportHeight="24">
              <path android:fillColor="#4285F4" android:pathData="M12,2L14.5,9.5L22,12L14.5,14.5L12,22L9.5,14.5L2,12L9.5,9.5L12,2Z"/>
          </vector>
          EOF

          echo "<resources><style name='Theme.GeminiAi' parent='Theme.MaterialComponents.DayNight.NoActionBar'><item name='android:statusBarColor'>#131314</item></style></resources>" > app/src/main/res/values/themes.xml

          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/><uses-permission android:name="android.permission.RECORD_AUDIO"/><uses-permission android:name="android.permission.CAMERA"/><uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/><uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>
              <application android:label="Gemini Pro" android:icon="@drawable/ic_gemini_logo" android:theme="@style/Theme.GeminiAi" android:requestLegacyExternalStorage="true">
                  <activity android:name=".MainActivity" android:exported="true" android:configChanges="orientation|screenSize"><intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter></activity>
              </application>
          </manifest>
          EOF

      - name: Build with Gradle
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Gemini-Pro-Ultimate-v2
          path: app/build/outputs/apk/release/app-release-unsigned.apk
