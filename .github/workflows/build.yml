name: Build Gemini Pro Oreo Ultimate

on:
  push:
    branches: [ Webview ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Native Project Structure
        run: |
          echo "include ':app'" > settings.gradle
          echo "android.useAndroidX=true" > gradle.properties

          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { 
                  classpath "com.android.tools.build:gradle:8.2.2"
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.22"
              }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          mkdir -p app/src/main/java/com/vibestudio/geminiai
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/anim

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application'; id 'org.jetbrains.kotlin.android' }
          android {
              namespace 'com.vibestudio.geminiai'
              compileSdk 34
              defaultConfig {
                  applicationId "com.vibestudio.geminiai"
                  minSdk 26
                  targetSdk 34
                  versionCode 10
                  versionName "1.9-OreoStable"
              }
              buildTypes { release { minifyEnabled false } }
              compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
              kotlinOptions { jvmTarget = '17' }
          }
          dependencies {
              implementation "androidx.appcompat:appcompat:1.6.1"
              implementation "com.google.android.material:material:1.9.0"
          }
          EOF

          # Pulse Animation for Android 8.1
          cat <<EOF > app/src/main/res/anim/pulse.xml
          <set xmlns:android="http://schemas.android.com/apk/res/android">
              <scale android:duration="1000" android:fromXScale="1.0" android:fromYScale="1.0" android:toXScale="1.1" android:toYScale="1.1" android:pivotX="50%" android:pivotY="50%" android:repeatCount="infinite" android:repeatMode="reverse"/>
          </set>
          EOF

          # MainActivity.kt (Robust Oreo Download Engine)
          cat <<EOF > app/src/main/java/com/vibestudio/geminiai/MainActivity.kt
          package com.vibestudio.geminiai
          import android.Manifest
          import android.app.AlertDialog
          import android.app.DownloadManager
          import android.content.*
          import android.graphics.Color
          import android.net.Uri
          import android.os.*
          import android.util.Base64
          import android.view.View
          import android.view.animation.AnimationUtils
          import android.webkit.*
          import android.widget.*
          import androidx.appcompat.app.AppCompatActivity
          import androidx.core.app.ActivityCompat
          import java.io.File
          import java.io.FileOutputStream

          class MainActivity : AppCompatActivity() {
              private lateinit var webView: WebView
              private lateinit var splash: View
              private lateinit var offlineLayout: LinearLayout

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_main)
                  window.statusBarColor = Color.parseColor("#131314")
                  
                  webView = findViewById(R.id.webView)
                  splash = findViewById(R.id.custom_splash)
                  offlineLayout = findViewById(R.id.offline_layout)
                  val logo = findViewById<ImageView>(R.id.splash_logo)
                  logo.startAnimation(AnimationUtils.loadAnimation(this, R.anim.pulse))

                  ActivityCompat.requestPermissions(this, arrayOf(
                      Manifest.permission.WRITE_EXTERNAL_STORAGE, Manifest.permission.READ_EXTERNAL_STORAGE,
                      Manifest.permission.RECORD_AUDIO, Manifest.permission.CAMERA
                  ), 1)

                  setupWebView()
                  
                  findViewById<Button>(R.id.retry_btn).setOnClickListener {
                      offlineLayout.visibility = View.GONE
                      splash.visibility = View.VISIBLE
                      webView.reload()
                  }

                  webView.loadUrl("https://gemini.google.com/")
              }

              private fun setupWebView() {
                  webView.settings.apply {
                      javaScriptEnabled = true
                      domStorageEnabled = true
                      allowFileAccess = true
                      databaseEnabled = true
                      setSupportZoom(false)
                      userAgentString = "Mozilla/5.0 (Linux; Android 10; SM-G973F) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Mobile Safari/537.36"
                  }

                  webView.addJavascriptInterface(object : Any() {
                      @JavascriptInterface
                      fun processBlob(base64: String, mime: String) {
                          showDownloadDialog(base64, mime)
                      }
                  }, "AndroidBridge")

                  webView.webViewClient = object : WebViewClient() {
                      override fun onPageFinished(v: WebView?, u: String?) {
                          splash.animate().alpha(0f).setDuration(400).withEndAction { splash.visibility = View.GONE; webView.visibility = View.VISIBLE }
                          
                          // Injected Script to catch Blob Images from Gemini
                          v?.loadUrl("javascript:(function() { " +
                              "var oldCreate = URL.createObjectURL; " +
                              "URL.createObjectURL = function(blob) { " +
                              "  if (blob.type.includes('image')) { " +
                              "    var reader = new FileReader(); " +
                              "    reader.onload = function() { AndroidBridge.processBlob(reader.result, blob.type); }; " +
                              "    reader.readAsDataURL(blob); " +
                              "  } " +
                              "  return oldCreate(blob); " +
                              "}; " +
                              "})()")
                      }
                      override fun onReceivedError(v: WebView?, r: WebResourceRequest?, e: WebResourceError?) {
                          webView.visibility = View.GONE; offlineLayout.visibility = View.VISIBLE; splash.visibility = View.GONE
                      }
                  }
              }

              private fun showDownloadDialog(base64: String, mime: String) {
                  runOnUiThread {
                      AlertDialog.Builder(this)
                          .setTitle("Download Image")
                          .setMessage("Do you want to save this image to your gallery?")
                          .setPositiveButton("Download") { _, _ -> saveImage(base64, mime) }
                          .setNegativeButton("Cancel", null)
                          .show()
                  }
              }

              private fun saveImage(base64: String, mime: String) {
                  try {
                      val pureBase64 = base64.substring(base64.indexOf(",") + 1)
                      val data = Base64.decode(pureBase64, Base64.DEFAULT)
                      val ext = if (mime.contains("png")) "png" else "jpg"
                      val name = "Gemini_\${System.currentTimeMillis()}.\$ext"
                      val file = File(Environment.getExternalStoragePublicDirectory(Environment.DIRECTORY_DOWNLOADS), name)
                      
                      FileOutputStream(file).use { it.write(data) }
                      
                      val dm = getSystemService(Context.DOWNLOAD_SERVICE) as DownloadManager
                      dm.addCompletedDownload(name, "Gemini Generated Image", true, mime, file.absolutePath, data.size.toLong(), true)
                      Toast.makeText(this, "Saved to Downloads!", Toast.LENGTH_LONG).show()
                  } catch (e: Exception) {
                      Toast.makeText(this, "Error: Could not save file", Toast.LENGTH_SHORT).show()
                  }
              }

              override fun onBackPressed() {
                  if (webView.canGoBack()) webView.goBack() else {
                      AlertDialog.Builder(this).setMessage("Exit App?").setPositiveButton("Yes") { _, _ -> finish() }.setNegativeButton("No", null).show()
                  }
              }
          }
          EOF

          # Modern Layout (Compatible with 8.1)
          cat <<EOF > app/src/main/res/layout/activity_main.xml
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#131314">
              <WebView android:id="@+id/webView" android:layout_width="match_parent" android:layout_height="match_parent" android:visibility="gone"/>
              <LinearLayout android:id="@+id/offline_layout" android:layout_width="match_parent" android:layout_height="match_parent" android:gravity="center" android:orientation="vertical" android:visibility="gone" android:padding="20dp">
                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="No Internet Connection" android:textColor="#FFFFFF" android:textSize="18sp"/>
                  <Button android:id="@+id/retry_btn" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Retry" android:layout_marginTop="20dp" android:backgroundTint="#4285F4"/>
              </LinearLayout>
              <LinearLayout android:id="@+id/custom_splash" android:layout_width="match_parent" android:layout_height="match_parent" android:gravity="center" android:orientation="vertical" android:background="#131314">
                  <ImageView android:id="@+id/splash_logo" android:layout_width="80dp" android:layout_height="80dp" android:src="@drawable/ic_gemini_logo"/>
                  <ProgressBar android:layout_width="40dp" android:layout_height="40dp" android:layout_marginTop="40dp" android:indeterminateTint="#4285F4"/>
              </LinearLayout>
          </RelativeLayout>
          EOF

          cat <<EOF > app/src/main/res/drawable/ic_gemini_logo.xml
          <vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="100dp" android:height="100dp" android:viewportWidth="24" android:viewportHeight="24">
              <path android:fillColor="#4285F4" android:pathData="M12,2L14.5,9.5L22,12L14.5,14.5L12,22L9.5,14.5L2,12L9.5,9.5L12,2Z"/>
          </vector>
          EOF

          echo "<resources><style name='Theme.GeminiAi' parent='Theme.MaterialComponents.DayNight.NoActionBar'><item name='android:statusBarColor'>#131314</item></style></resources>" > app/src/main/res/values/themes.xml

          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/><uses-permission android:name="android.permission.RECORD_AUDIO"/><uses-permission android:name="android.permission.CAMERA"/><uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/><uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>
              <application android:label="Gemini Pro" android:icon="@drawable/ic_gemini_logo" android:theme="@style/Theme.GeminiAi" android:requestLegacyExternalStorage="true">
                  <activity android:name=".MainActivity" android:exported="true" android:screenOrientation="portrait" android:configChanges="orientation|screenSize"><intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter></activity>
              </application>
          </manifest>
          EOF

      - name: Build with Gradle
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Gemini-Pro-v1.9-Final
          path: app/build/outputs/apk/release/app-release-unsigned.apk
