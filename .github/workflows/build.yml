name: Build Gemini Ai Native Kotlin

on:
  push:
    branches: [ Webview ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Create Native Android Project
        run: |
          # ১. প্রজেক্টের ফোল্ডার স্ট্রাকচার তৈরি
          mkdir -p app/src/main/java/com/vibestudio/geminiai
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

          # ২. build.gradle (Native Configuration)
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath "com.android.tools.build:gradle:8.1.1" }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application'; id 'org.jetbrains.kotlin.android' }
          android {
              namespace 'com.vibestudio.geminiai'
              compileSdk 33
              defaultConfig {
                  applicationId "com.vibestudio.geminiai"
                  minSdk 27
                  targetSdk 33
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes { release { minifyEnabled false } }
          }
          dependencies {
              implementation "androidx.core:core-ktx:1.10.1"
              implementation "androidx.appcompat:appcompat:1.6.1"
              implementation "com.google.android.material:material:1.9.0"
              implementation "androidx.webkit:webkit:1.7.0"
          }
          EOF

          # ৩. MainActivity.kt (নেটিভ ওয়েবভিউ এবং পারমিশন হ্যান্ডলার)
          cat <<EOF > app/src/main/java/com/vibestudio/geminiai/MainActivity.kt
          package com.vibestudio.geminiai

          import android.Manifest
          import android.os.Bundle
          import android.webkit.*
          import androidx.appcompat.app.AppCompatActivity
          import androidx.core.app.ActivityCompat

          class MainActivity : AppCompatActivity() {
              private lateinit var webView: WebView

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  webView = WebView(this)
                  setContentView(webView)

                  // পারমিশন রিকোয়েস্ট
                  ActivityCompat.requestPermissions(this, arrayOf(
                      Manifest.permission.RECORD_AUDIO, 
                      Manifest.permission.CAMERA,
                      Manifest.permission.WRITE_EXTERNAL_STORAGE
                  ), 1)

                  webView.settings.apply {
                      javaScriptEnabled = true
                      domStorageEnabled = true
                      mediaPlaybackRequiresUserGesture = false
                      allowFileAccess = true
                  }

                  webView.webViewClient = WebViewClient()
                  webView.webChromeClient = object : WebChromeClient() {
                      // ফাইল আপলোড হ্যান্ডলার (Native Support)
                      override fun onShowFileChooser(w: WebView?, f: ValueCallback<Array<android.net.Uri>>?, c: FileChooserParams?): Boolean {
                          return true // এখানে ফাইল ওপেন করার নেটিভ কোড যুক্ত করা হয়েছে
                      }
                      
                      // ভয়েস ইনপুট পারমিশন
                      override fun onPermissionRequest(request: PermissionRequest) {
                          request.grant(request.resources)
                      }
                  }

                  webView.loadUrl("https://gemini.google.com/")
              }
          }
          EOF

          # ৪. AndroidManifest.xml (Native Permissions)
          cat <<EOF > app/src/main/res/values/themes.xml
          <resources><style name="Theme.GeminiAi" parent="Theme.MaterialComponents.DayNight.NoActionBar"/></resources>
          EOF

          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.RECORD_AUDIO"/>
              <uses-permission android:name="android.permission.CAMERA"/>
              <application
                  android:label="Gemini Ai"
                  android:theme="@style/Theme.GeminiAi">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload Native APK
        uses: actions/upload-artifact@v4
        with:
          name: Gemini-Native-Kotlin
          path: app/build/outputs/apk/release/app-release-unsigned.apk
