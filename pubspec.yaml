name: gemini_ai_pro
description: "A professional Gemini WebView application for Android 8.1"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # ওয়েবভিউ চালানোর জন্য প্রধান প্যাকেজ
  webview_flutter: ^4.7.0
  
  # স্ট্যাটাস বার এবং নেভিগেশন বার কালার কন্ট্রোল করার জন্য (ঐচ্ছিক কিন্তু সুন্দর দেখাবে)
  flutter_statusbarcolor_ns: ^0.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # যদি ভবিষ্যতে কোনো লোগো বা ইমেজ ব্যবহার করতে চান, তবে এখানে অ্যাড করবেন
  # assets:
  #   - assets/images/logo.png
